<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Interview Coach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #app { width: 100%; max-width: 700px; height: 90vh; display: flex; flex-direction: column; gap: 12px; padding: 16px; }

    h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; }

    #setup { display: flex; flex-direction: column; gap: 10px; }

    #role-row { display: flex; gap: 8px; }
    #role-input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; font-size: 0.95rem; }

    #role-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 6px 14px; border-radius: 999px; border: 1px solid #334155;
      background: #1e293b; color: #94a3b8; font-size: 0.82rem; cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: #6366f1; color: #e2e8f0; }
    .chip.active { background: #6366f1; border-color: #6366f1; color: #fff; }

    #difficulty-row { display: flex; align-items: center; gap: 10px; }
    #difficulty-row span { font-size: 0.85rem; color: #94a3b8; white-space: nowrap; }
    #difficulty-btns { display: flex; gap: 6px; }
    .diff-btn {
      padding: 5px 14px; border-radius: 6px; border: 1px solid #334155;
      background: #1e293b; color: #94a3b8; font-size: 0.82rem; cursor: pointer;
      transition: all 0.15s;
    }
    .diff-btn:hover { border-color: #6366f1; color: #e2e8f0; }
    .diff-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; font-weight: 600; }

    #start-btn { padding: 10px 18px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    #start-btn:hover { background: #4f46e5; }
    #start-btn:disabled { background: #475569; cursor: default; }

    #chat-box { flex: 1; overflow-y: auto; background: #1e293b; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 10px; line-height: 1.5; font-size: 0.92rem; white-space: pre-wrap; }
    .msg.ai { background: #334155; align-self: flex-start; }
    .msg.user { background: #6366f1; align-self: flex-end; }

    #input-row { display: flex; gap: 8px; }
    #user-input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; font-size: 0.95rem; }
    #send-btn { padding: 10px 18px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    #send-btn:disabled { background: #475569; cursor: default; }

    .typing { color: #94a3b8; font-style: italic; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="app">
    <h1>AI Interview Coach</h1>

    <div id="setup">
      <div id="role-row">
        <input id="role-input" placeholder="Enter a job role or pick one below..." />
        <button id="start-btn">Start Interview</button>
      </div>

      <div id="role-chips">
        <span class="chip" data-role="Software Engineer">Software Engineer</span>
        <span class="chip" data-role="Product Manager">Product Manager</span>
        <span class="chip" data-role="Data Analyst">Data Analyst</span>
        <span class="chip" data-role="UX Designer">UX Designer</span>
        <span class="chip" data-role="DevOps Engineer">DevOps Engineer</span>
        <span class="chip" data-role="Marketing Manager">Marketing Manager</span>
      </div>

      <div id="difficulty-row">
        <span>Difficulty:</span>
        <div id="difficulty-btns">
          <button class="diff-btn" data-level="Junior">Junior</button>
          <button class="diff-btn active" data-level="Mid">Mid</button>
          <button class="diff-btn" data-level="Senior">Senior</button>
        </div>
      </div>
    </div>

    <div id="chat-box">
      <p class="typing">Pick a role and difficulty above, then start your interview.</p>
    </div>

    <div id="input-row">
      <input id="user-input" placeholder="Your answer..." disabled />
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

  <script>
    let sessionId = null;
    let selectedDifficulty = "Mid";

    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const startBtn = document.getElementById('start-btn');
    const roleInput = document.getElementById('role-input');

    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        roleInput.value = chip.dataset.role;
      });
    });

    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedDifficulty = btn.dataset.level;
      });
    });

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    startBtn.addEventListener('click', async () => {
      const role = roleInput.value.trim();
      if (!role) { roleInput.focus(); return; }

      sessionId = crypto.randomUUID();
      chatBox.innerHTML = '<p class="typing">Starting your interview...</p>';
      startBtn.disabled = true;

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId,
          role,
          difficulty: selectedDifficulty,
          message: '__START__',
        }),
      });

      const data = await res.json();
      chatBox.innerHTML = '';
      addMsg(data.reply, 'ai');
      userInput.disabled = false;
      sendBtn.disabled = false;
      startBtn.disabled = false;
      userInput.focus();
    });

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || !sessionId) return;

      addMsg(text, 'user');
      userInput.value = '';
      sendBtn.disabled = true;

      const typing = document.createElement('p');
      typing.className = 'typing';
      typing.textContent = 'Interviewer is thinking...';
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text }),
      });

      const data = await res.json();
      typing.remove();
      addMsg(data.reply, 'ai');
      sendBtn.disabled = false;
      userInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
